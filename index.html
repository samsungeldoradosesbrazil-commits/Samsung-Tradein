<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Trade In</title>
 
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
 
body {
  background: #f4f6fb;
  padding: 15px;
}
 
.container {
  max-width: 1200px;
  margin: auto;
}
 
.header {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.08);
}

.header h1 {
  font-size: 24px;
  color: #1428A0;
}

.header p {
  color: #666;
  font-size: 14px;
  margin-top: 5px;
}
 
.card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.08);
}

.card h3 {
  font-size: 16px;
  margin-bottom: 10px;
}
 
input {
  width: 100%;
  padding: 12px 15px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 16px;
}
 
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #1428A0;
  color: white;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #0f1f7a;
}

/* GRID COMPACTO */
.grid-modelos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 15px;
}
 
.modelo {
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 3px 10px rgba(0,0,0,.06);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.modelo h2 {
  font-size: 18px;
  text-align: center;
  margin-bottom: 10px;
  color: #222;
}

.produto-topo {
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 10px;
  margin-bottom: 10px;
}

.produto-img {
  width: 110px;
  height: 110px;
  object-fit: contain;
}

.lancamento-box {
  background: rgba(255, 255, 255, 0.9);
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid rgba(20, 40, 160, 0.15);
  font-size: 12px;
}

.lancamento-box h4 {
  font-size: 11px;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.lancamento-box ul {
  list-style: none;
}

.lancamento-box li {
  color: #1428A0;
}
 
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 10px;
  border-radius: 8px;
  overflow: hidden;
  font-size: 13px;
}
 
th {
  background: #1428A0;
  color: white;
  padding: 6px 4px;
  font-weight: 600;
}

th.th-destaque {
  background: #f1c40f;
  color: #000;
}
 
td {
  padding: 6px 4px;
  text-align: center;
  border-bottom: 1px solid #eee;
}
 
.info-box {
  background: rgba(255, 255, 255, 0.75);
  padding: 8px 12px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 12px;
  line-height: 1.4;
}
</style>
</head>
<body>
 
<div class="container">
 
  <div class="header">
    <h1>Calculadora Trade In</h1>
    <p>Smartphones & Smartwatches</p>
  </div>
 
  <div class="card">
    <h3>Valor da Avaliação (R$)</h3>
    <input
      type="number"
      id="avaliacao"
      placeholder="Digite o valor da avaliação do usado"
      onkeydown="sePressionarEnter(event)"
    >
    <button onclick="calcular()">Calcular</button>
  </div>
 
  <div id="resultados" class="grid-modelos"></div>
 
</div>
 
<script>
function moeda(valor) {
  return valor.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function sePressionarEnter(event) {
  if (event.key === "Enter") {
    calcular();
  }
}
 
function calcular() {
  const avaliacao = Number(document.getElementById("avaliacao").value) || 0;
 
  // Cálculos Celulares
  const flip256 = Math.max(0, 7199 - avaliacao);
  const flip512 = Math.max(0, 7999 - avaliacao);
 
  const fold256 = Math.max(0, 10099 - avaliacao);
  const fold512 = Math.max(0, 10899 - avaliacao);
 
  const ultra256 = Math.max(0, 11099 - avaliacao);
  const ultra512 = Math.max(0, 12199 - avaliacao);
  const ultra1tb = Math.max(0, 14299 - avaliacao);
 
  document.getElementById("resultados").innerHTML = `
    <!-- GALAXY Z FLIP 8 -->
    <div class="modelo" style="background:linear-gradient(135deg,#ffd8ea,#ff85bb)">
      <h2>Galaxy Z Flip 8</h2>
      
      <div class="produto-topo">
        <img src="flip8.jpg" alt="Galaxy Z Flip 8" class="produto-img">
        <div class="lancamento-box">
          <h4>Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(9199)}</li>
            <li><b>512GB:</b> ${moeda(10799)}</li>
          </ul>
        </div>
      </div>
      
      <div class="info-box">
        <b>Cores:</b> Pink • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Mod.</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(8199)}</td>
          <td>${moeda(flip256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(8999)}</td>
          <td>${moeda(flip512)}</td>
        </tr>
      </table>
    </div>
 
    <!-- GALAXY Z FOLD 8 -->
    <div class="modelo" style="background:linear-gradient(135deg,#f6e7c7,#d7b06d)">
      <h2>Galaxy Z Fold 8</h2>

      <div class="produto-topo">
        <img src="fold8.webp" alt="Galaxy Z Fold 8" class="produto-img">
        <div class="lancamento-box">
          <h4>Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(12599)}</li>
            <li><b>512GB:</b> ${moeda(14199)}</li>
          </ul>
        </div>
      </div>
 
      <div class="info-box">
        <b>Cores:</b> Lavanda • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Mod.</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(11599)}</td>
          <td>${moeda(fold256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(12399)}</td>
          <td>${moeda(fold512)}</td>
        </tr>
      </table>
    </div>
 
    <!-- GALAXY Z FOLD 8 ULTRA -->
    <div class="modelo" style="background:linear-gradient(135deg,#e0d8ff,#8a74ff)">
      <h2>Galaxy Z Fold 8 Ultra</h2>

      <div class="produto-topo">
        <img src="fold8-ultra.webp" alt="Galaxy Z Fold 8 Ultra" class="produto-img">
        <div class="lancamento-box">
          <h4>Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(14599)}</li>
            <li><b>512GB:</b> ${moeda(16199)}</li>
            <li><b>1TB:</b> ${moeda(19399)}</li>
          </ul>
        </div>
      </div>
 
      <div class="info-box">
        <b>Cores:</b> Violeta • Grafite • Lavanda
      </div>
 
      <table>
        <tr>
          <th>Mod.</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(12599)}</td>
          <td>${moeda(ultra256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(13399)}</td>
          <td>${moeda(ultra512)}</td>
        </tr>
        <tr>
          <td>1TB</td>
          <td>${moeda(15799)}</td>
          <td>${moeda(ultra1tb)}</td>
        </tr>
      </table>
    </div>

    <!-- MÓDULO GALAXY WATCH 9 (MBO) -->
    <div class="modelo" style="background:linear-gradient(135deg,#d1f4ff,#72d6ff)">
      <h2>Galaxy Watch 9 (MBO)</h2>

      <div class="produto-topo">
        <!-- Nome do arquivo mapeado conforme repositório: watch.webp -->
        <img src="watch.webp" alt="Galaxy Watch 9" class="produto-img">
        <div class="lancamento-box">
          <h4>Preço Base</h4>
          <ul>
            <li><b>Watch 9 BT:</b> ${moeda(999)}</li>
            <li><b>Watch 9 LTE:</b> ${moeda(1099)}</li>
            <li><b>Watch 9 Ultra:</b> ${moeda(2099)}</li>
          </ul>
        </div>
      </div>
 
      <div class="info-box">
        <b>Cores:</b> Prata • Grafite • Titânio
      </div>
 
      <table>
        <tr>
          <th colspan="3" class="th-destaque">MBO</th>
        </tr>
        <tr>
          <th>Modelo</th>
          <th>Valor</th>
          <th>Com Handraiser</th>
        </tr>
        <tr>
          <td>WATCH 9 BT</td>
          <td>${moeda(999)}</td>
          <td><b>${moeda(799)}</b></td>
        </tr>
        <tr>
          <td>WATCH 9 LTE</td>
          <td>${moeda(1099)}</td>
          <td><b>${moeda(899)}</b></td>
        </tr>
        <tr>
          <td>WATCH 9 ULTRA</td>
          <td>${moeda(2099)}</td>
          <td><b>${moeda(1899)}</b></td>
        </tr>
      </table>
    </div>
  `;
}

calcular();
</script>
 
</body>
</html>
