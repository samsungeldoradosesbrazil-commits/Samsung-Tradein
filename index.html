<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Trade In</title>
 
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
 
body {
  background: #f4f6fb;
  padding: 15px;
}
 
.container {
  max-width: 1000px;
  margin: auto;
}
 
.header {
  background: #fff;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.1);
}
 
.card {
  background: #fff;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.1);
}
 
input {
  width: 100%;
  padding: 15px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 18px;
}
 
button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  background: #1428A0;
  color: white;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0f1f7a;
}
 
.modelo {
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,.08);
}

/* Novo layout para Imagem + Preço de Lançamento lado a lado */
.produto-topo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.produto-img {
  width: 100%;
  max-width: 220px;
  display: block;
}

.lancamento-box {
  background: rgba(255, 255, 255, 0.9);
  padding: 15px 20px;
  border-radius: 15px;
  border: 2px solid rgba(20, 40, 160, 0.15);
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.lancamento-box h4 {
  font-size: 14px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.lancamento-box ul {
  list-style: none;
}

.lancamento-box li {
  font-size: 15px;
  color: #1428A0;
  margin-bottom: 4px;
}
 
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 15px;
  border-radius: 8px;
  overflow: hidden;
}
 
th {
  background: #1428A0;
  color: white;
  padding: 10px;
}
 
td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}
 
.info-box {
  background: rgba(255, 255, 255, 0.75);
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
  line-height: 1.7;
}
</style>
</head>
<body>
 
<div class="container">
 
  <div class="header">
    <h1>Calculadora Trade In</h1>
    <p>Galaxy Z Flip 8 • Galaxy Z Fold 8 • Galaxy Z Fold 8 Ultra</p>
  </div>
 
  <div class="card">
    <h3>Valor da Avaliação (R$)</h3>
    <input
      type="number"
      id="avaliacao"
      placeholder="Digite o valor da avaliação do usado"
      onkeydown="sePressionarEnter(event)"
    >
    <button onclick="calcular()">Calcular</button>
  </div>
 
  <div id="resultados"></div>
 
</div>
 
<script>
function moeda(valor) {
  return valor.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function sePressionarEnter(event) {
  if (event.key === "Enter") {
    calcular();
  }
}
 
function calcular() {
  const avaliacao = Number(document.getElementById("avaliacao").value) || 0;
 
  const flip256 = Math.max(0, 7199 - avaliacao);
  const flip512 = Math.max(0, 7999 - avaliacao);
 
  const fold256 = Math.max(0, 10099 - avaliacao);
  const fold512 = Math.max(0, 10899 - avaliacao);
 
  const ultra256 = Math.max(0, 11099 - avaliacao);
  const ultra512 = Math.max(0, 12199 - avaliacao);
  const ultra1tb = Math.max(0, 14299 - avaliacao);
 
  document.getElementById("resultados").innerHTML = `
    <!-- GALAXY Z FLIP 8 -->
    <div class="modelo" style="background:linear-gradient(135deg,#ffd8ea,#ff85bb)">
      <h2>Galaxy Z Flip 8</h2>
      
      <div class="produto-topo">
        <img src="flip8.jpg" alt="Galaxy Z Flip 8" class="produto-img">
        <div class="lancamento-box">
          <h4>Preços de Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(9199)}</li>
            <li><b>512GB:</b> ${moeda(10799)}</li>
          </ul>
        </div>
      </div>
      
      <div class="info-box">
        <b>Cores:</b><br>Pink • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Lançamento</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(9199)}</td>
          <td>${moeda(8199)}</td>
          <td>${moeda(flip256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(10799)}</td>
          <td>${moeda(8999)}</td>
          <td>${moeda(flip512)}</td>
        </tr>
      </table>
    </div>
 
    <!-- GALAXY Z FOLD 8 -->
    <div class="modelo" style="background:linear-gradient(135deg,#f6e7c7,#d7b06d)">
      <h2>Galaxy Z Fold 8</h2>

      <div class="produto-topo">
        <img src="fold8.webp" alt="Galaxy Z Fold 8" class="produto-img">
        <div class="lancamento-box">
          <h4>Preços de Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(12599)}</li>
            <li><b>512GB:</b> ${moeda(14199)}</li>
          </ul>
        </div>
      </div>
 
      <div class="info-box">
        <b>Cores:</b><br>Lavanda • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Lançamento</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(12599)}</td>
          <td>${moeda(11599)}</td>
          <td>${moeda(fold256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(14199)}</td>
          <td>${moeda(12399)}</td>
          <td>${moeda(fold512)}</td>
        </tr>
      </table>
    </div>
 
    <!-- GALAXY Z FOLD 8 ULTRA -->
    <div class="modelo" style="background:linear-gradient(135deg,#e0d8ff,#8a74ff)">
      <h2>Galaxy Z Fold 8 Ultra</h2>

      <div class="produto-topo">
        <img src="fold8-ultra.webp" alt="Galaxy Z Fold 8 Ultra" class="produto-img">
        <div class="lancamento-box">
          <h4>Preços de Lançamento</h4>
          <ul>
            <li><b>256GB:</b> ${moeda(14599)}</li>
            <li><b>512GB:</b> ${moeda(16199)}</li>
            <li><b>1TB:</b> ${moeda(19399)}</li>
          </ul>
        </div>
      </div>
 
      <div class="info-box">
        <b>Cores:</b><br>Violeta • Grafite • Lavanda
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Lançamento</th>
          <th>Sem Tradein</th>
          <th>Com Tradein</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(14599)}</td>
          <td>${moeda(12599)}</td>
          <td>${moeda(ultra256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(16199)}</td>
          <td>${moeda(13399)}</td>
          <td>${moeda(ultra512)}</td>
        </tr>
        <tr>
          <td>1TB</td>
          <td>${moeda(19399)}</td>
          <td>${moeda(15799)}</td>
          <td>${moeda(ultra1tb)}</td>
        </tr>
      </table>
    </div>
  `;
}

calcular();
</script>
 
</body>
</html>
