<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Trade In</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6fb;
    padding:15px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header,.card{
    background:#fff;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 3px 15px rgba(0,0,0,.1);
}

.header{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:18px;
    margin-top:10px;
}

.modelo{
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.produto-img{
    width:100%;
    max-width:260px;
    display:block;
    margin:auto;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:#fff;
}

th{
    background:#1428A0;
    color:#fff;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.info-box{
    background:rgba(255,255,255,.6);
    padding:12px;
    border-radius:12px;
    margin-top:12px;
    line-height:1.6;
}

.avaliacao-box{
    margin-top:10px;
    font-weight:bold;
    color:#1428A0;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <h1>Calculadora Trade In</h1>
        <p>Galaxy Z Flip 8 • Galaxy Z Fold 8 • Galaxy Z Fold 8 Ultra</p>
    </div>

    <div class="card">
        <h3>Valor da Avaliação</h3>

        <input
            type="number"
            id="avaliacao"
            placeholder="Digite a avaliação"
            min="0"
            oninput="calcular()">

        <div id="valorInformado" class="avaliacao-box"></div>
    </div>

    <div id="resultados"></div>

</div>

<script>

const produtos = [
{
    nome:"Galaxy Z Flip 8",
    imagem:"flip8.jpg",
    fundo:"linear-gradient(135deg,#ffd8ea,#ff85bb)",
    cores:"Pink • Grafite • Creme",
    seguros:[
        "Garantia Estendida: R$ 629",
        "Quebra: R$ 799",
        "Roubo: R$ 949",
        "Combo: R$ 1.199"
    ],
    modelos:[
        { nome:"256GB", semTrade:8199, tradeBase:7199 },
        { nome:"512GB", semTrade:8999, tradeBase:7999 }
    ]
},
{
    nome:"Galaxy Z Fold 8",
    imagem:"fold8.webp",
    fundo:"linear-gradient(135deg,#f6e7c7,#d7b06d)",
    cores:"Lavanda • Grafite • Creme",
    seguros:[
        "Quebra: R$ 1.239",
        "Roubo: R$ 3.099",
        "Combo: R$ 3.899"
    ],
    modelos:[
        { nome:"256GB", semTrade:11599, tradeBase:10099 },
        { nome:"512GB", semTrade:12399, tradeBase:10899 }
    ]
},
{
    nome:"Galaxy Z Fold 8 Ultra",
    imagem:"fold8-ultra.webp",
    fundo:"linear-gradient(135deg,#e0d8ff,#8a74ff)",
    cores:"Violeta • Grafite • Lavanda",
    seguros:[
        "Quebra: R$ 1.239",
        "Roubo: R$ 3.099",
        "Combo: R$ 3.899"
    ],
    modelos:[
        { nome:"256GB", semTrade:12599, tradeBase:11099 },
        { nome:"512GB", semTrade:13399, tradeBase:12199 },
        { nome:"1TB", semTrade:15799, tradeBase:14299 }
    ]
}
];

function moeda(valor){
    return valor.toLocaleString(
        "pt-BR",
        {
            style:"currency",
            currency:"BRL"
        }
    );
}

function calcular(){

    let avaliacao =
    Number(document.getElementById("avaliacao").value) || 0;

    if(avaliacao < 0){
        avaliacao = 0;
        document.getElementById("avaliacao").value = 0;
    }

    document.getElementById(
        "valorInformado"
    ).innerHTML =
    "Avaliação informada: " + moeda(avaliacao);

    let html = "";

    produtos.forEach(produto=>{

        let linhas = "";

        produto.modelos.forEach(modelo=>{

            const valorTrade =
            Math.max(
                0,
                modelo.tradeBase - avaliacao
            );

            linhas += `
            <tr>
                <td>${modelo.nome}</td>
                <td>${moeda(modelo.semTrade)}</td>
                <td>${moeda(valorTrade)}</td>
            </tr>
            `;
        });

        html += `
        <div class="modelo"
            style="background:${produto.fundo}">

            <img
                src="${produto.imagem}"
                class="produto-img"
                alt="${produto.nome}">

            <h2>${produto.nome}</h2>

            <div class="info-box">
                <b>Cores:</b><br>
                ${produto.cores}
            </div>

            <table>
                <tr>
                    <th>Modelo</th>
                    <th>Sem Trade In</th>
                    <th>Com Trade In</th>
                </tr>

                ${linhas}
            </table>

            <div class="info-box">
                <b>Seguros</b><br>
                ${produto.seguros.join("<br>")}
            </div>

        </div>
        `;
    });

    document.getElementById("resultados").innerHTML = html;
}

calcular();

</script>

</body>
</html>
