<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Trade In</title>
 
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
 
body {
  background: #f4f6fb;
  padding: 15px;
}
 
.container {
  max-width: 1000px;
  margin: auto;
}
 
.header {
  background: #fff;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.1);
}
 
.card {
  background: #fff;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 3px 15px rgba(0,0,0,.1);
}
 
input {
  width: 100%;
  padding: 15px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 18px;
}
 
button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  background: #1428A0;
  color: white;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0f1f7a;
}
 
.modelo {
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 3px 10px rgba(0,0,0,.08);
}
 
.produto-img {
  width: 100%;
  max-width: 260px;
  display: block;
  margin: auto;
  margin-bottom: 15px;
}
 
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 15px;
  border-radius: 8px;
  overflow: hidden;
}
 
th {
  background: #1428A0;
  color: white;
  padding: 10px;
}
 
td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}
 
.info-box {
  background: rgba(255, 255, 255, 0.75);
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
  line-height: 1.7;
}
</style>
</head>
<body>
 
<div class="container">
 
  <div class="header">
    <h1>Calculadora Trade In</h1>
    <p>Galaxy Z Flip 8 • Galaxy Z Fold 8 • Galaxy Z Fold 8 Ultra</p>
  </div>
 
  <div class="card">
    <h3>Valor da Avaliação (R$)</h3>
    <input
      type="number"
      id="avaliacao"
      placeholder="Digite o valor da avaliação do usado"
      onkeydown="sePressionarEnter(event)"
    >
    <button onclick="calcular()">Calcular</button>
  </div>
 
  <div id="resultados"></div>
 
</div>
 
<script>
function moeda(valor) {
  return valor.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function sePressionarEnter(event) {
  if (event.key === "Enter") {
    calcular();
  }
}
 
function calcular() {
  const avaliacao = Number(document.getElementById("avaliacao").value) || 0;
 
  const flip256 = Math.max(0, 7199 - avaliacao);
  const flip512 = Math.max(0, 7999 - avaliacao);
 
  const fold256 = Math.max(0, 10099 - avaliacao);
  const fold512 = Math.max(0, 10899 - avaliacao);
 
  const ultra256 = Math.max(0, 11099 - avaliacao);
  const ultra512 = Math.max(0, 12199 - avaliacao);
  const ultra1tb = Math.max(0, 14299 - avaliacao);
 
  document.getElementById("resultados").innerHTML = `
    <div class="modelo" style="background:linear-gradient(135deg,#ffd8ea,#ff85bb)">
      <img src="flip8.jpg" alt="Galaxy Z Flip 8" class="produto-img">
      <h2>Galaxy Z Flip 8</h2>
      
      <div class="info-box">
        <b>Cores:</b><br>Pink • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Sem TI</th>
          <th>Com TI</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(8199)}</td>
          <td>${moeda(flip256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(8999)}</td>
          <td>${moeda(flip512)}</td>
        </tr>
      </table>
    </div>
 
    <div class="modelo" style="background:linear-gradient(135deg,#f6e7c7,#d7b06d)">
      <img src="fold8.webp" alt="Galaxy Z Fold 8" class="produto-img">
      <h2>Galaxy Z Fold 8</h2>
 
      <div class="info-box">
        <b>Cores:</b><br>Lavanda • Grafite • Creme
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Sem TI</th>
          <th>Com TI</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(11599)}</td>
          <td>${moeda(fold256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(12399)}</td>
          <td>${moeda(fold512)}</td>
        </tr>
      </table>
    </div>
 
    <div class="modelo" style="background:linear-gradient(135deg,#e0d8ff,#8a74ff)">
      <img src="fold8-ultra.webp" alt="Galaxy Z Fold 8 Ultra" class="produto-img">
      <h2>Galaxy Z Fold 8 Ultra</h2>
 
      <div class="info-box">
        <b>Cores:</b><br>Violeta • Grafite • Lavanda
      </div>
 
      <table>
        <tr>
          <th>Modelo</th>
          <th>Sem TI</th>
          <th>Com TI</th>
        </tr>
        <tr>
          <td>256GB</td>
          <td>${moeda(12599)}</td>
          <td>${moeda(ultra256)}</td>
        </tr>
        <tr>
          <td>512GB</td>
          <td>${moeda(13399)}</td>
          <td>${moeda(ultra512)}</td>
        </tr>
        <tr>
          <td>1TB</td>
          <td>${moeda(15799)}</td>
          <td>${moeda(ultra1tb)}</td>
        </tr>
      </table>
    </div>
  `;
}

calcular();
</script>
 
</body>
</html>
